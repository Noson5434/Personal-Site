<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Favicon -->
    <link rel="icon" href="images/tech-hoagie-website-favicon.png">
    <title>Noson Rabinovich</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Font Awesome -->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js"></script>
    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.6.4.js"></script>
    <!-- MDB -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.2.0/mdb.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="login.css">
  </head>

  <body class="mdb-skin-custom modal-open" style="overflow: hidden; padding-right: 17px;">

    <div class="modal fade show" id="navbarLogin" tabindex="-1" style="display: block; padding-left: 0px;" data-gtm-vis-first-on-screen-2340190_1302="44798" data-gtm-vis-total-visible-time-2340190_1302="100" data-gtm-vis-has-fired-2340190_1302="1" aria-modal="true" role="dialog">
      <div class="modal-dialog" role="document">

        <!-- Modal content -->
        <div class="modal-content">
          <!-- Modal body -->
          <div class="modal-body">

            <!-- Pills navs -->
            <ul class="nav nav-pills nav-justified mb-3" role="tablist">
              <li class="nav-item" role="presentation">
                <a class="nav-link show active" data-mdb-toggle="pill" href="#navbarLogin-login" role="tab" aria-selected="true">Login</a>
              </li>
              <li class="nav-item" role="presentation">
                <a class="nav-link" data-mdb-toggle="pill" href="#navbarLogin-signup" role="tab" aria-selected="false" tabindex="-1">Register</a>
              </li>
            </ul>

            <!-- Pills panels -->
            <div class="tab-content">

              <!--Panel 1-->
              <div class="tab-pane fade in active show" id="navbarLogin-login" role="tabpanel">

                <!-- Default form login -->
                <form id="login" class="text-center needs-validation" action="login" method="post" name="login-form" data-bitwarden-watching="1">

                  <p class="status"></p>

                  <div class="text-center justify-content-center mb-3">
                    <div>
                      <div>Connect with:</div>
                      <div>
                        <a class="link btn text-dark" href="#" title="Connect with Facebook" role="button"><span class="fa-brands fa-facebook-f"></span></a>
                        <a class="link btn text-dark" href="#" title="Connect with Google" role="button"><span class="fa-brands fa-google"></span></a>
                        <a class="link btn text-dark" href="#" title="Connect with Twitter" role="button"><span class="fa-brands fa-twitter"></span></a>
                      </div>
                    </div>
                  </div>

                  <p class="text-center">or:</p>

                  <!-- Email input -->
                  <div class="form-outline form-auth-mdb mb-4">
                    <input type="text" id="username" class="form-control" name="username" required="">
                    <label class="form-label" for="username" style="margin-left: 0px;">Your e-mail or username</label>
                    <div class="form-notch">
                      <div class="form-notch-leading" style="width: 9px;"></div>
                      <div class="form-notch-middle" style="width: 146.4px;"></div>
                      <div class="form-notch-trailing"></div>
                    </div>
                  </div>

                  <!-- Password input -->
                  <div class="form-outline form-auth-mdb mb-4">
                    <input type="password" id="password" class="form-control" name="password" autocomplete="off" required="">
                    <label class="form-label" for="password" style="margin-left: 0px;">Your password</label>
                    <div class="form-notch">
                      <div class="form-notch-leading" style="width: 9px;"></div>
                      <div class="form-notch-middle" style="width: 92.8px;"></div>
                      <div class="form-notch-trailing"></div>
                    </div>
                  </div>

                  <!-- 2 column grid layout for inline styling -->
                  <div class="justify-content-center mb-4">
                    <a href="#">Forgot password?</a>
                  </div>

                  <button class="btn btn-primary btn-block mb-4" type="submit" value="LOGIN">Sign in</button>

                  <!-- Register buttons -->
                  <div class="text-center">
                    <p>Not a member? <a href="#navbarLogin-signup" class="auth-modal-toggle" data-auth-modal-tab="sign-up" on>Register</a></p>
                  </div>

                </form>
                <!-- Default form login -->

              </div>
              <!--/.Panel 1-->

              <!--Panel 2-->
              <div class="tab-pane fade" id="navbarLogin-signup" role="tabpanel">

                <!-- Default form register  -->
                <form id="register" class="text-center needs-validation" action="register" method="post" name="register-form" data-bitwarden-watching="1">

                  <!-- Social login -->

                  <p class="status"></p>

                  <div class="text-center mb-3">
                    <div>
                      <div>Connect with:</div>
                      <div>
                        <a class="link btn text-dark" href="#" title="Connect with Facebook" role="button"><span class="fa-brands fa-facebook-f"></span></a>
                        <a class="link btn text-dark" href="#" title="Connect with Google" role="button"><span class="fa-brands fa-google"></span></a>
                        <a class="link btn text-dark" href="#" title="Connect with Twitter" role="button"><span class="fa-brands fa-twitter"></span></a>
                      </div>
                    </div>
                  </div>
                  <!-- Social login -->

                  <p class="text-center">or:</p>

                  <!-- Name input -->
                  <div class="form-outline form-auth-mdb mb-4">
                    <input type="text" for="name" id="signonname" class="form-control" name="signonname" required="" minlength="3">
                    <label for="signonname" class="form-label" style="margin-left: 0px;">Your name</label>
                    <div class="invalid-feedback">Please provide a valid name.</div>
                    <div class="form-notch">
                      <div class="form-notch-leading" style="width: 9px;"></div>
                      <div class="form-notch-middle" style="width: 68.8px;"></div>
                      <div class="form-notch-trailing"></div>
                    </div>
                  </div>

                  <!-- Username input -->
                  <div class="form-outline form-auth-mdb mb-4">
                    <input type="text" id="signonusername" class="form-control" name="signonusername" required="" minlength="3">
                    <label for="signonusername" class="form-label" style="margin-left: 0px;">Your username</label>
                    <div class="invalid-feedback">Please provide a valid username.</div>
                    <div class="form-notch">
                      <div class="form-notch-leading" style="width: 9px;"></div>
                      <div class="form-notch-middle" style="width: 93.6px;"></div>
                      <div class="form-notch-trailing"></div>
                    </div>
                  </div>

                  <!-- Email input -->
                  <div class="form-outline form-auth-mdb mb-4">
                    <input type="email" id="signonemail" class="form-control" name="email" required="">
                    <label for="email" class="form-label" style="margin-left: 0px;">Your email</label>
                    <div class="invalid-feedback">Please provide a valid email.</div>
                    <div class="form-notch">
                      <div class="form-notch-leading" style="width: 9px;"></div>
                      <div class="form-notch-middle" style="width: 68px;"></div>
                      <div class="form-notch-trailing"></div>
                    </div>
                  </div>

                  <!-- Password input -->
                  <div class="form-outline form-auth-mdb mb-4">
                    <input type="password" id="signonpassword" class="form-control" name="signonpassword" autocomplete="off" required="" minlength="5">
                    <label for="signonpassword" class="form-label" style="margin-left: 0px;">Your password</label>
                    <div class="invalid-feedback">Please provide a valid password.</div>
                    <div class="form-notch">
                      <div class="form-notch-leading" style="width: 9px;"></div>
                      <div class="form-notch-middle" style="width: 92.8px;"></div>
                      <div class="form-notch-trailing"></div>
                    </div>
                  </div>

                  <!-- Repeat Password input -->
                  <div class="form-outline form-auth-mdb mb-4">
                    <input type="password" id="password2" class="form-control" name="password2" autocomplete="off" required="" minlength="5">
                    <label for="password2" class="form-label" style="margin-left: 0px;">Repeat password</label>
                    <div id="repeat-password-feedback" class="invalid-feedback">Please repeat the password.</div>
                    <div class="form-notch">
                      <div class="form-notch-leading" style="width: 9px;"></div>
                      <div class="form-notch-middle" style="width: 106.4px;"></div>
                      <div class="form-notch-trailing"></div>
                    </div>
                  </div>

                  <!-- Subscribe checkbox -->
                  <div class="form-check d-flex justify-content-center pb-3">
                    <input type="checkbox" class="form-check-input me-1" id="newsletter" name="newsletter" value="subscribe">
                    <label class="form-check-label" for="newsletter">I agree to sign up for MDB account notifications and newsletter</label>
                  </div>

                  <!-- Subscribe checkbox -->

                  <button class="btn btn-primary btn-block mb-3" id="AJAXAuthRegisterBtn" type="submit" value="SIGNUP">
                    Sign up
                  </button>

                </form>
                <!-- Default form register  -->

              </div>
              <!--/.Panel 2-->

            </div>
            <!-- Pills panels -->

          </div>
          <!-- Modal footer -->
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-mdb-dismiss="modal">
              Close
            </button>
          </div>
        </div>
        <!-- Modal content -->
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
