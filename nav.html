<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Google Verification -->
    <meta name="google-site-verification" content="Yji9F0VEdDy4gJ4nneF1EQnd-hr5Gvog4PYHmiDR0fo">
    <title>Nav Control</title>
    <!-- Favicon -->
    <link rel="icon" href="images/tech-hoagie-website-favicon.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Font Awesome -->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js"></script>
    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.6.4.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
  </head>

  <body>

    <!-- Navbar -->
    <nav class="navbar fixed-top navbar-expand-lg navbar-light bg-light">
      <!-- Container wrapper -->
      <div class="container-fluid">
        <!-- Toggle button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarButtons" aria-controls="navbarButtons" aria-expanded="false" aria-label="Toggle navigation">
          <span class="fa-solid fa-bars"></span>
        </button>

        <!-- Collapsible wrapper -->
        <div class="collapse navbar-collapse" id="navbarButtons">
          <!-- Left Elements -->
          <ul class="navbar-nav mr-auto mt-2 mt-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="#">Home <span class="sr-only">(current)</span></a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Contact</a>
            </li>
          </ul>
          <!-- Left Elements -->
        </div>
        <!-- Collapsible wrapper -->

        <!-- Right Elements -->
        <div class="dropdown">
          <a href="#" class="dropdown-toggle d-flex align-items-center hidden-arrow" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <img src="https://mdbcdn.b-cdn.net/img/new/avatars/4.webp" alt="User Profile" class="rounded-circle" height="25" loading="lazy">
          </a>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
            <li>
              <a href="#" class="dropdown-item">My Profile</a>
            </li>
            <li>
              <a href="#" class="dropdown-item">Settings</a>
            </li>
            <li>
              <a href="#" class="dropdown-item">Logout</a>
            </li>
          </ul>
        </div>
        <!-- Right Elements -->
      </div>
    </nav>
    <!-- Navbar -->

    <script src="script.js" async="true"></script>
  </body>
</html>
